<div style="padding: 20px;">
    <h3 style="margin-bottom: 20px;">Segment Files</h3>

    <!-- Input Files Section -->
    <div style="margin-bottom: 30px;">
        <h4 style="margin-bottom: 10px;">Input Files & Parameters</h4>
        <div style="margin-bottom: 10px;">
            <label>
                Input Folder:
                <input type="text" id="inputFolder" value="./examples/" style="width: 300px; padding: 6px;">
            </label>
            <button onclick="scanFolder()" style="margin-left: 5px;">🔍 Scan</button>
            <button onclick="document.getElementById('inputFolder').value='./examples/'" style="margin-left: 8px; background: #6c757d; font-size: 0.85em;">Examples</button>
            <button onclick="document.getElementById('inputFolder').value='~/Movies/link2video/'" style="margin-left: 4px; background: #6c757d; font-size: 0.85em;">~/Movies</button>
            <span id="scanStatus" style="margin-left: 10px; color: #999; font-size: 0.9em;"></span>
        </div>
        <div style="margin-bottom: 10px;">
            <label>
                Job Concurrency: <input type="number" id="jobConcurrency" value="2" min="1" max="8" style="width: 60px; padding: 6px;">
            </label>
            <label style="margin-left: 20px;">
                <input type="checkbox" id="dryRun"> Dry Run
            </label>
            <button onclick="submitJob()" style="margin-left: 20px; background: #28a745;">Process</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>File</th>
                    <th style="width: 100px;">Namespace</th>
                    <th style="width: 80px;">Threshold</th>
                    <th style="width: 80px;">Quiet</th>
                    <th style="width: 70px;">Pad</th>
                    <th style="width: 70px;">Thread</th>
                    <th style="width: 80px;">Skip</th>
                    <th style="width: 50px;">Action</th>
                </tr>
            </thead>
            <tbody id="inputFilesTable">
            </tbody>
        </table>
    </div>

    <!-- Active Jobs Section -->
    <div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h4 style="margin: 0;">Active Jobs</h4>
            <button onclick="clearAllJobs()" style="background: #dc3545;">🗑️ Clear All</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Job ID</th>
                    <th style="width: 100px;">Status</th>
                    <th style="width: 150px;">Progress</th>
                    <th style="width: 100px;">Segments</th>
                    <th>Error</th>
                    <th style="width: 150px;">Action</th>
                </tr>
            </thead>
            <tbody id="jobsTable">
            </tbody>
        </table>
    </div>

    <script>
        // State
        let inputFiles = [];

        async function scanFolder() {
            const folder = document.getElementById('inputFolder').value.trim();
            if (!folder) {
                alert('Please enter a folder path');
                return;
            }
            const status = document.getElementById('scanStatus');
            status.textContent = 'Scanning…';
            try {
                const response = await fetch(`/api/scan?path=${encodeURIComponent(folder)}`);
                const data = await response.json();
                if (!response.ok) {
                    status.textContent = '✗ ' + data.error;
                    return;
                }
                if (data.count === 0) {
                    status.textContent = 'No .mov or .mp4 files found';
                    return;
                }
                inputFiles = data.files;
                renderInputFiles();
                status.textContent = `✓ ${data.count} file${data.count !== 1 ? 's' : ''} found`;
            } catch (error) {
                status.textContent = '✗ ' + error.message;
            }
        }

        function removeFile(index) {
            inputFiles.splice(index, 1);
            renderInputFiles();
        }

        function renderInputFiles() {
            const tbody = document.getElementById('inputFilesTable');
            tbody.innerHTML = inputFiles.map((file, index) => `
                <tr>
                    <td><input type="text" value="${file.input}" placeholder="Edit to full path" onchange="inputFiles[${index}].input = this.value;" style="width: 100%; max-width: 300px; padding: 4px;" title="Click to edit full file path"></td>
                    <td><input type="text" value="${file.namespace}" onchange="inputFiles[${index}].namespace = this.value;"></td>
                    <td><input type="text" value="${file.parameters.threshold}" onchange="inputFiles[${index}].parameters.threshold = this.value;"></td>
                    <td><input type="number" value="${file.parameters.quiet_for}" step="0.1" onchange="inputFiles[${index}].parameters.quiet_for = parseFloat(this.value);"></td>
                    <td><input type="number" value="${file.parameters.padding}" step="0.1" onchange="inputFiles[${index}].parameters.padding = parseFloat(this.value);"></td>
                    <td><input type="number" value="${file.parameters.threads}" min="1" onchange="inputFiles[${index}].parameters.threads = parseInt(this.value);"></td>
                    <td><input type="number" value="${file.parameters.skip_shorter}" step="0.1" onchange="inputFiles[${index}].parameters.skip_shorter = parseFloat(this.value);"></td>
                    <td><button class="danger" onclick="removeFile(${index})">Remove</button></td>
                </tr>
            `).join('');
        }

        async function submitJob() {
            if (inputFiles.length === 0) {
                alert('Please add files');
                return;
            }
            const jobData = {
                files: inputFiles,
                output_dir: inputFiles[0]?.output_dir || '',
                job_concurrency: parseInt(document.getElementById('jobConcurrency').value),
                dry_run: document.getElementById('dryRun').checked,
            };

            try {
                const response = await fetch('/api/jobs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(jobData),
                });
                const result = await response.json();
                if (response.ok) {
                    inputFiles = [];
                    renderInputFiles();
                    pollJobs();
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        window.updateJobsTable = function(jobs) {
            if (jobs.length === 0) {
                document.getElementById('jobsTable').innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">No jobs</td></tr>';
                return;
            }

            let html = '';
            jobs.forEach(job => {
                const completedCount = job.completed_count || 0;
                const totalCount = job.files_count || 1;
                const progress = totalCount > 0 ? (completedCount / totalCount) * 100 : 0;

                // Fetch full job details to get error messages
                fetch(`/api/jobs/${job.id}`)
                    .then(r => r.json())
                    .then(fullJob => {
                        // Find first error in files
                        const fileWithError = fullJob.files.find(f => f.error);
                        if (fileWithError) {
                            const errorCell = document.querySelector(`[data-job-error="${job.id}"]`);
                            if (errorCell) {
                                errorCell.innerHTML = `<small style="color: #dc3545;">${fileWithError.error}</small>`;
                            }
                        }
                    })
                    .catch(() => {});

                html += `
                    <tr>
                        <td>${job.id}</td>
                        <td><span class="status-badge status-${job.status}">${job.status}</span></td>
                        <td>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress}%"></div>
                            </div>
                            <small>${completedCount}/${totalCount}</small>
                        </td>
                        <td>${completedCount}</td>
                        <td data-job-error="${job.id}"><small style="color: #999;">—</small></td>
                        <td>
                            ${job.status === 'running' || job.status === 'pending' || job.status === 'failed' ? `<button class="danger" onclick="cancelJob('${job.id}')">Delete</button>` : ''}
                            ${job.status === 'completed' ? `<button class="danger" onclick="cancelJob('${job.id}')">Delete</button>` : ''}
                        </td>
                    </tr>
                `;
            });
            document.getElementById('jobsTable').innerHTML = html;
        };

        async function cancelJob(jobId) {
            try {
                await fetch(`/api/jobs/${jobId}`, { method: 'DELETE' });
                pollJobs();
            } catch (error) {
                alert('Error deleting job: ' + error.message);
            }
        }

        async function clearAllJobs() {
            if (!confirm('Delete all job history? This cannot be undone.')) {
                return;
            }
            try {
                await fetch('/api/jobs/clear/all', { method: 'DELETE' });
                pollJobs();
            } catch (error) {
                alert('Error clearing jobs: ' + error.message);
            }
        }

        function viewJob(jobId) {
            alert('View job: ' + jobId);
        }

        async function pollJobs() {
            try {
                const response = await fetch('/api/jobs');
                const data = await response.json();
                window.updateJobsTable(data.jobs);
            } catch (error) {
                console.error('Polling error:', error);
            }
        }

        renderInputFiles();
        pollJobs();
        setInterval(pollJobs, 2000);
    </script>
</div>
